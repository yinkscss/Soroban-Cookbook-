name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  # Rust toolchain to use — must support the `rust-version` declared in the
  # workspace Cargo.toml (currently 1.74) plus the wasm32 target.
  RUST_VERSION: "stable"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Formatting
  # ─────────────────────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Lint
  # ─────────────────────────────────────────────────────────────────────────
  clippy:
    name: Lint (Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Test
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run workspace tests
        run: cargo test --workspace --all-features

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Coverage
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (Tarpaulin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --all-features --out xml --output-dir ./coverage --timeout 300

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-xml
          path: ./coverage/cobertura.xml

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Basic examples (fast, per-example feedback)
  # ─────────────────────────────────────────────────────────────────────────
  basic-examples:
    name: Basic Examples CI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/basics/01-hello-world
          - examples/basics/02-storage-patterns
          - examples/basics/03-authentication
          - examples/basics/03-custom-errors
          - examples/basics/04-events
          - examples/basics/05-auth-context
          - examples/basics/05-error-handling
          - examples/basics/06-soroban-types
          - examples/basics/06-type-conversions
          - examples/basics/06-validation-patterns
          - examples/basics/07-enum-types
          - examples/basics/08-custom-structs
          - examples/basics/09-primitive-types
          - examples/basics/10-data-types
          - examples/basics/11-collection-types
          - examples/basics/11-event-filtering
          - examples/basics/basic-event-emission
          - examples/basics/events
          - examples/basics/instance-storage
          - examples/basics/persistent-storage
          - examples/basics/temporary_storage
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-basic-${{ matrix.example }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-basic-

      - name: Run tests for basic example
        run: cargo test --manifest-path ${{ matrix.example }}/Cargo.toml --all-features

      - name: Build basic example Wasm
        run: cargo build --manifest-path ${{ matrix.example }}/Cargo.toml --target wasm32-unknown-unknown --release

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Coverage (tarpaulin)
  # Configured via tarpaulin.toml at the workspace root.
  # Reports are uploaded to Codecov for historical tracking and badge display.
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # Cache the Cargo registry AND the compiled tarpaulin binary together
      # so repeated runs don't rebuild tarpaulin from source every time.
      - name: Cache Cargo registry and tarpaulin binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tarpaulin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-

      - name: Install cargo-tarpaulin
        run: |
          if ! command -v cargo-tarpaulin &> /dev/null; then
            cargo install cargo-tarpaulin --locked
          fi

      # tarpaulin.toml controls output format (xml + html + lcov),
      # output directory (coverage/), timeout, and exclusions.
      - name: Run tarpaulin
        run: cargo tarpaulin

      # Keep the full coverage report as a downloadable artifact for
      # historical review — retained for 90 days.
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 90

      # Upload Cobertura XML to Codecov for badge + historical trend graphs.
      # CODECOV_TOKEN is required for private repos; harmless for public ones.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          flags: workspace
          name: soroban-cookbook
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 6: Build Wasm
  # ─────────────────────────────────────────────────────────────────────────
  build-wasm:
    name: Build Wasm Targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install stellar-cli
        # soroban-cli was renamed to stellar-cli at v22. Use the latest
        # release that is compatible with soroban-sdk 21.x (protocol 21).
        run: cargo install --locked stellar-cli --version 22.1.0

      - name: Build all workspace contracts as Wasm
        run: |
          cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Install wasm-opt (Binaryen)
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Optimize wasm and report before/after size
        run: |
          set -euo pipefail
          report="wasm-size-report.txt"
          echo "Contract WASM size comparison (bytes)" > "$report"
          echo "file,original,optimized,saved,percent_saved" >> "$report"

          found=0
          while IFS= read -r wasm; do
            found=1
            opt="${wasm%.wasm}.opt.wasm"

            # Some artifacts require bulk-memory to pass Binaryen validation.
            # Retry with explicit feature enablement to avoid hard-failing CI.
            if ! wasm-opt -Oz "$wasm" -o "$opt"; then
              echo "Retrying with --enable-bulk-memory for $wasm"
              if ! wasm-opt --enable-bulk-memory -Oz "$wasm" -o "$opt"; then
                echo "$wasm,SKIPPED,SKIPPED,SKIPPED,SKIPPED" >> "$report"
                echo "Skipping $wasm: wasm-opt failed with/without bulk-memory"
                continue
              fi
            fi

            original=$(stat -c%s "$wasm")
            optimized=$(stat -c%s "$opt")
            saved=$((original - optimized))
            percent_saved=$(awk -v o="$original" -v s="$saved" 'BEGIN { if (o == 0) print "0.00"; else printf "%.2f", (s * 100) / o }')

            echo "$wasm,$original,$optimized,$saved,${percent_saved}%" >> "$report"
          done < <(find target/wasm32-unknown-unknown/release -type f -name "*.wasm" ! -name "*.opt.wasm" ! -path "*/deps/*" | sort)

          if [ "$found" -eq 0 ]; then
            echo "No wasm artifacts found after build." >> "$report"
          fi

          cat "$report"

      - name: Upload wasm size report
        uses: actions/upload-artifact@v4
        with:
          name: wasm-size-report
          path: wasm-size-report.txt
